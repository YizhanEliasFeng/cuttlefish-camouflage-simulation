run_name: procedural_checkerboard_intermittent_perceptual
seed: 42
device: cpu

image:
  height: 128
  width: 128
  channels: 1

basis:
  type: random_smooth
  n_basis: 64
  low_res: 16

target:
  type: image
  path: data/backgrounds_processed/128_gray/checkerboard/procedural_checkerboard_checker_016px_128_l.png

weights:
  init_scale: 1.0
  seed_offset: 2000

loss:
  type: perceptual
  perceptual_weight: 1.0
  perceptual_layers:
    - relu1_2
    - relu2_2
  layer_weights:
    relu1_2: 0.5
    relu2_2: 1.0
  vgg_pretrained: true

optimizer:
  type: intermittent_decay
  learning_rate: 0.012
  sampling: fixed
  sample_interval: 8
  decay_tau: 3.0
  motor_momentum: 0.65
  noise_sigma: 0.003
  noise_decay: 0.995

simulation:
  steps: 1000
  save_every: 8

visualization:
  fps: 12
  cmap: viridis

output:
  root: outputs/runs
