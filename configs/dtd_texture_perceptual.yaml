run_name: dtd_texture_perceptual
seed: 42
device: cpu

image:
  height: 128
  width: 128
  channels: 1

basis:
  type: random_smooth
  n_basis: 64
  low_res: 16

target:
  type: image
  path: data/backgrounds_processed/128_gray/banded/dtd_banded_banded_0002_128_l.png

weights:
  init_scale: 1.0
  seed_offset: 2000

loss:
  type: perceptual
  perceptual_weight: 1.0
  perceptual_layers:
    - relu1_2
    - relu2_2
  layer_weights:
    relu1_2: 0.5
    relu2_2: 1.0
  vgg_pretrained: true

optimizer:
  type: adam
  learning_rate: 0.03
  noise_sigma: 0.0
  noise_decay: 1.0

simulation:
  steps: 180
  save_every: 10

visualization:
  fps: 12
  cmap: viridis

output:
  root: outputs/runs

